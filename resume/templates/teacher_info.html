<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Update Teacher Info</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
     <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white py-3">
            <h4 class="mb-0 fw-bold"><i class="bi bi-pencil-square"></i> Update Professional Details</h4>
        </div>
        
        <div class="card-body p-4">
            <form method="POST" action="{% url 'update_teacher_info' %}">
                {% csrf_token %}
                
                <div class="mb-3">
                    <label class="fw-bold text-secondary">Contact Email</label>
                    <input type="email" name="email" class="form-control" value="{{ resume.email|default:'' }}" required>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="fw-bold text-secondary">College / University</label>
                        <input type="text" name="college" class="form-control" value="{{ resume.college|default:'' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="fw-bold text-secondary">Department / Branch</label>
                        <input type="text" name="branch" class="form-control" value="{{ resume.branch|default:'' }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="fw-bold text-secondary">Skills & Expertise</label>
                    <input type="text" name="skills" class="form-control" placeholder="e.g., Python, Machine Learning, Data Analysis" value="{{ resume.skills|default:'' }}" required>
                </div>

                <div class="mb-4">
                    <label class="fw-bold text-secondary">Professional Experience</label>
                    <textarea name="experience" class="form-control" rows="5" required>{{ resume.experience|default:'' }}</textarea>
                </div>
                
                <div class="d-flex justify-content-between mt-4 border-top pt-3">
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary px-4 fw-bold">Cancel</a>
                    <button type="submit" class="btn btn-success px-5 fw-bold shadow-sm">Save Details</button>
                </div>
                
            </form>
        </div>
    </div>

</div>

</body>
</html>
