
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex align-items-center justify-content-center vh-100">

    <div class="card p-5 shadow-lg" style="width: 600px;border-radius: 20px;">
        <h2 class="card-title mb-4 fw-bold text-center">Login</h2>
        
        
        {% if error %}
            <div class="alert alert-danger py-2 small" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fs-5">Username:</label>
                <input type="text" name="username" id="username" class="form-control form-control-lg" required autocomplete="username">
            </div>
            
            <div class="mb-4">
                <label for="password" class="form-label fs-5">Password:</label>
                <input type="password" name="password" id="password" class="form-control form-control-lg" required autocomplete="current-password">
            </div>
            
            <!-- Green Login Button matching the image concept -->
            <button type="submit" class="btn btn-success btn-lg w-100">Login</button>
        </form>
    </div>

</body>
</html>
