<form method="POST">
    {% csrf_token %}
    
    <label>Name:</label>
    <input type="text" name="name" class="form-control" value="{{ resume.name }}">
    
    <label>Skills:</label>
    <textarea name="skills" class="form-control">{{ resume.skills }}</textarea>
    
    <button type="submit" class="btn btn-primary mt-3">Save Resume</button>
</form>
